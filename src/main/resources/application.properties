spring.application.name=moto-advisor

# ---------------------------------------------------------------------------
# Core paths
# ---------------------------------------------------------------------------
# Absolute or relative path to SQLite database file.
app.db.path=moto-advisor.db

# OWL ontology resource/path used by OntologyService.
# Supports classpath:... or absolute file path.
app.ontology.path=classpath:ontology/moto-advisor.owl

# CSV seed import configuration.
app.csv.import.enabled=true
app.csv.import.path=classpath:data/motorcycles.csv

# ---------------------------------------------------------------------------
# JADE base configuration
# ---------------------------------------------------------------------------
app.jade.enabled=true
app.jade.host=localhost
app.jade.port=1099
app.jade.platform-id=moto-advisor-platform

# ---------------------------------------------------------------------------
# Datasource - SQLite
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:sqlite:${app.db.path}
spring.datasource.driver-class-name=org.sqlite.JDBC

# ---------------------------------------------------------------------------
# SQL init (schema.sql)
# ---------------------------------------------------------------------------
# Run schema.sql even for non-embedded databases (SQLite).
spring.sql.init.mode=always

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging.level.org.example.motoadvisor=INFO
